<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV3 JavaScript Compiler</title>
  
  <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
  <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
  <script src="https://unpkg.com/blockly/msg/en.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f9;
    }
    .toolbar {
      margin-bottom: 15px;
      padding: 10px;
      background-color: #ffffff;
      border: 1px solid #ccc;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #45a049;
    }
    #renameBtn {
      background-color: #008CBA;
    }
    #renameBtn:hover {
      background-color: #007BB5;
    }
    #blocklyDiv {
      height: 70vh;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button id="uploadBtn">Compile & Upload to EV3</button>
    
    <div style="border-left: 2px solid #eee; height: 30px;"></div>
    
    <button id="renameBtn">Rename Project</button>
    <span id="fileNameDisplay" style="font-family: monospace; font-size: 16px; color: #333;">MyProgram.rbf</span>
  </div>

  <div id="blocklyDiv"></div>
